<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Notatapp</title>
<link rel="stylesheet" href="style.css">
</head>

<body>


<h1>Notatapp</h1>

<h2>Lage ny liste</h2>

<div class="box">
<button onclick="opprettNotat()">opprett notat</button>
<button onclick="opprettListe()">opprett to do liste</button>
</div>


<div id="notatBox" style="display:none;">
<textarea id="notatTekst" placeholder="Skriv notat..."></textarea>
<button onclick="lagreNotat()">Lagre</button>
</div>


<div id="listeBox" style="display:none;">
  <h3>To do liste</h3>

  <input type="text" id="todoTittel" placeholder="Tittel">

  <div id="tasks"></div>

  <input type="text" id="nyOppgave" placeholder="Ny oppgave">
  <button onclick="leggTilOppgave()">Legg til</button>

  <br><br>
  <button onclick="lagreListe()">Lagre liste</button>
</div>

<h2>Dine notater:</h2>
<div id="notater"></div>

<script src="java.js"></script>

</body>
</html>
